<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zangkoor Spontaan - Admin</title>

  <link rel="stylesheet" href="../css/style.css">

  <style>
    #admin-content {
      display: none;
    }
  </style>
</head>

<body>

<div id="nav-placeholder"></div>

<header class="hero">
  <div class="hero-content">
    <h1>Zangkoor Spontaan</h1>
    <p>Admin omgeving</p>
  </div>
</header>

<main id="admin-content">
  <section>
    <h2>Welkom (Admin)</h2>
    <p>
      Dit is de admin omgeving van Zangkoor Spontaan.
    </p>
  </section>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/auth.js"></script>
<script src="../components/menu.js"></script>

<script>
  window.addEventListener("load", async () => {
    const loginPath = "../leden/login.html";
    const adminContent = document.getElementById("admin-content");

    try {
      const session = await window.authHelpers.getCurrentSession();

      if (!session) {
        window.location.href = loginPath;
        return;
      }

      const profile = await window.authHelpers.getCurrentProfile();

      if (!profile) {
        window.location.href = loginPath;
        return;
      }

      if (profile.role !== "admin" || profile.status !== "active") {
        window.location.href = loginPath;
        return;
      }

      if (adminContent) {
        adminContent.style.display = "block";
      }
    } catch (error) {
      console.error("Fout bij admin-autorisatie:", error);
      window.location.href = loginPath;
    }
  });
</script>

</body>
</html>
