backend:
  name: github
  repo: JimGroen2160/spontaan-website
  branch: main
  base_url: https://plain-morning-bab6.jim-groen14.workers.dev
  auth_endpoint: /auth

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "pagina"
    label: "Pagina"
    folder: "content"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Inhoud", name: "body", widget: "markdown" }

  - name: "agenda"
    label: "Agenda"
    folder: "agenda"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime" }
      - { label: "Beschrijving", name: "body", widget: "markdown" }
