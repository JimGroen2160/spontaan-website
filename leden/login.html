<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Inloggen</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div id="nav-placeholder"></div>

<main>
  <h1>Inloggen</h1>

  <!-- 🔥 BELANGRIJK: action en method toegevoegd -->
  <form id="login-form" class="login-form" action="#" method="post">

    <label for="email">E-mailadres</label>
    <input type="email" id="email" name="email" required>

    <label for="password">Wachtwoord</label>
    <input type="password" id="password" name="password" required>

    <!-- 🔥 BELANGRIJK: expliciet submit -->
    <button type="submit" id="login-btn">Login</button>

  </form>

  <p id="error" style="color:red;"></p>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  console.log("Login script gestart");

  const form = document.getElementById("login-form");

  if (!form) {
    console.error("FORM NIET GEVONDEN");
    return;
  }

  const SUPABASE_URL = "https://wqtpngqematpnswetxxj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_HZFlCh-O1XyjGVAVlUAUFA_OfNmlApL";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 🔥 EXTRA: klik detectie
  document.getElementById("login-btn").addEventListener("click", () => {
    console.log("👉 BUTTON GEKLIKT");
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    console.log("🔥 SUBMIT GEDRUKT");

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await client.auth.signInWithPassword({
      email,
      password
    });

    console.log("RESULT:", data);
    console.log("ERROR:", error);

    if (error || !data.session) {
      document.getElementById("error").innerText =
        error?.message || "Login mislukt";
      return;
    }

    console.log("✅ LOGIN OK");

    window.location.href = "dashboard.html";
  });

});
</script>

<script src="../components/menu.js"></script>

</body>
</html>
