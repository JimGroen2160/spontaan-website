<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Inloggen</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div id="nav-placeholder"></div>

<main style="text-align:center; margin-top:100px;">
  <h1>Inloggen</h1>

  <form id="login-form" style="max-width:400px; margin:auto;">
    <input type="email" id="email" placeholder="E-mailadres" required><br><br>
    <input type="password" id="password" placeholder="Wachtwoord" required><br><br>
    <button type="submit">Login</button>
  </form>

  <p id="error" style="color:red;"></p>
</main>

<div id="footer-placeholder"></div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = window.supabase.createClient(
  "https://wqtpngqematpnswetxxj.supabase.co",
  "sb_publishable_HZFlCh-O1XyjGVAVlUAUFA_OfNmlApL"
);

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("error").innerText = error.message;
  } else {
    window.location.href = "/leden/dashboard.html";
  }
});
</script>

<script src="../components/menu.js"></script>

</body>
</html>
