<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div id="nav-placeholder"></div>

<main>
  <h1>Welkom in het ledenportaal</h1>

  <p id="status">Controleren...</p>

  <button id="logout">Uitloggen</button>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
window.addEventListener("load", async () => {

  console.log("Dashboard gestart");

  const SUPABASE_URL = "https://wqtpngqematpnswetxxj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_HZFlCh-O1XyjGVAVlUAUFA_OfNmlApL";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const { data: { session } } = await client.auth.getSession();

  if (!session) {
    console.log("Geen session → redirect");
    window.location.href = "login.html";
    return;
  }

  console.log("Session OK");

  const statusEl = document.getElementById("status");
  const logoutBtn = document.getElementById("logout");

  if (!statusEl || !logoutBtn) {
    console.error("Dashboard elementen niet gevonden");
    return;
  }

  statusEl.innerText = "Je bent succesvol ingelogd.";

  logoutBtn.addEventListener("click", async () => {
    await client.auth.signOut();
    window.location.href = "login.html";
  });

});
</script>

<script src="../components/menu.js"></script>

</body>
</html>
