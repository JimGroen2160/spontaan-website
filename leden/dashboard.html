<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div id="nav-placeholder"></div>

<main>
  <h1>Welkom in het ledenportaal</h1>

  <p id="status">Controleren...</p>

  <button id="logout">Uitloggen</button>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/auth.js"></script>

<script>
window.addEventListener("load", async () => {
  console.log("Dashboard gestart");

  const statusEl = document.getElementById("status");
  const logoutBtn = document.getElementById("logout");

  if (!statusEl || !logoutBtn) {
    console.error("Dashboard elementen niet gevonden");
    return;
  }

  try {
    const session = await window.authHelpers.getCurrentSession();

    if (!session) {
      console.log("Geen session → redirect");
      window.location.href = "login.html";
      return;
    }

    console.log("Session OK");
    statusEl.innerText = "Je bent succesvol ingelogd.";

    logoutBtn.addEventListener("click", async () => {
      await window.authHelpers.logout();
      window.location.href = "login.html";
    });
  } catch (error) {
    console.error("Dashboardfout:", error);
    window.location.href = "login.html";
  }
});
</script>

<script src="../components/menu.js"></script>

</body>
</html>
