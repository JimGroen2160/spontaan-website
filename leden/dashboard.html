<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div id="nav-placeholder"></div>

<main>
  <h1>Welkom in het ledenportaal</h1>
  <p id="status">Controleren...</p>

  <button id="logout">Uitloggen</button>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://jouw-project-id.supabase.co";
const SUPABASE_ANON_KEY = "jouw-anon-key";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

document.addEventListener("DOMContentLoaded", async () => {

  const { data: { session } } = await supabaseClient.auth.getSession();

  if (!session) {
    window.location.href = "/leden/login.html";
    return;
  }

  document.getElementById("status").innerText = "Je bent succesvol ingelogd.";

  document.getElementById("logout").addEventListener("click", async () => {
    await supabaseClient.auth.signOut();
    window.location.href = "/leden/login.html";
  });

});
</script>

<script src="../components/menu.js"></script>

</body>
</html>
