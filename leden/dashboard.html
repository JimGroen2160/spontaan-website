<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div id="nav-placeholder"></div>

<main>
  <h1>Welkom in het ledenportaal</h1>

  <section class="portal-card" aria-label="Ledenportaal acties">
    <p id="status">Controleren...</p>

    <div class="portal-actions">
      <a id="admin-link" class="portal-action-link" href="../admin/index.html" style="display: none;">Naar adminomgeving</a>
      <button id="logout" class="portal-action-button" style="display: none;">Uitloggen</button>
    </div>
  </section>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/auth.js"></script>

<script>
window.addEventListener("load", async () => {
  console.log("Dashboard gestart");

  const statusEl = document.getElementById("status");
  const logoutBtn = document.getElementById("logout");
  const adminLink = document.getElementById("admin-link");

  if (!statusEl || !logoutBtn || !adminLink) {
    console.error("Dashboard elementen niet gevonden");
    return;
  }

  async function redirectToLogin() {
    await window.authHelpers.logout();
    window.location.href = "login.html";
  }

  async function activatePendingProfile(client) {
    const { data, error } = await client.rpc("activate_current_user_profile");

    if (error) {
      console.error("Activeren pending profiel mislukt:", error);
      throw error;
    }

    return data;
  }

  try {
    const session = await window.authHelpers.getCurrentSession();

    if (!session) {
      console.log("Geen session → redirect");
      window.location.href = "login.html";
      return;
    }

    const client = window.authHelpers.ensureSupabaseClient();
    let profile = await window.authHelpers.getCurrentProfile();

    if (!profile) {
      console.warn("Geen profiel gevonden voor ingelogde gebruiker.");
      await redirectToLogin();
      return;
    }

    if (profile.status === "inactive") {
      console.warn("Inactief profiel probeert ledenportaal te openen.");
      statusEl.innerText = "Je account is niet actief. Neem contact op met de beheerder.";
      setTimeout(redirectToLogin, 2000);
      return;
    }

    if (profile.status === "pending") {
      statusEl.innerText = "Je account wordt geactiveerd...";

      profile = await activatePendingProfile(client);

      if (!profile || profile.status !== "active") {
        console.warn("Profiel kon niet worden geactiveerd:", profile);
        statusEl.innerText = "Je account kon niet automatisch worden geactiveerd. Neem contact op met de beheerder.";
        return;
      }
    }

    if (profile.status !== "active") {
      console.warn("Onbekende of niet-toegestane profielstatus:", profile.status);
      await redirectToLogin();
      return;
    }

    console.log("Session en profiel OK");
    statusEl.innerText = "Je bent succesvol ingelogd.";

    if (profile.role === "admin") {
      adminLink.style.display = "inline-block";
    }

    logoutBtn.style.display = "inline-block";

    logoutBtn.addEventListener("click", async () => {
      await window.authHelpers.logout();
      window.location.href = "login.html";
    });
  } catch (error) {
    console.error("Dashboardfout:", error);
    statusEl.innerText = "Het ledenportaal kon niet worden geladen. Probeer opnieuw in te loggen.";
    setTimeout(redirectToLogin, 2500);
  }
});
</script>

<script src="../components/menu.js"></script>

</body>
</html>
